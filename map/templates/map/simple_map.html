<!DOCTYPE html>
{% load static %}
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>안전 경로 탐색</title>
<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
<link rel="stylesheet" href="{% static 'map/styles.css' %}">
<script src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey={{ tmap_app_key }}"></script>
<style>
    .route-card {
        display: inline-block;
        border: 2px solid #ccc;
        border-radius: 6px;
        padding: 6px 10px;
        margin: 4px;
        cursor: pointer;
        font-size: 13px;
        background: #f9f9f9;
        vertical-align: top;
        min-width: 90px;
        text-align: center;
    }
    .route-card:hover  { background: #e8e8e8; }
    .route-card.active { border-color: #DD0000; background: #fff0f0; }
    .route-card .score { font-size: 18px; font-weight: bold; }
    .route-card .label { font-size: 11px; color: #666; }
</style>
<script type="text/javascript">
    var map;
    var markerArr     = [];
    var routeData     = [];

    var selectedLat_s = null, selectedLon_s = null;
    var selectedLat_e = null, selectedLon_e = null;

    var routeConfigs = [
        { name: "추천",     searchOption: "0"  },
        { name: "대로우선", searchOption: "4"  },
        { name: "최단",     searchOption: "10" },
        { name: "계단제외", searchOption: "30" }
    ];

    var routeColors = ["#DD0000", "#0055FF", "#009900", "#FF8800"];

    // 경로별 폴리라인/마커 저장
    var activeLines   = {};   // idx → Polyline
    var activeFacMarkers = {}; // idx → [Marker, ...]

    // 시설 타입별 마커 이미지 URL
    var facilityIcons = {
        "police":     "{% static 'map/images/police.png' %}",
        "cctv":       "{% static 'map/images/cctv.png' %}",
        "security":   "{% static 'map/images/security.png' %}",
        "streetlamp": "{% static 'map/images/lamp.png' %}",
        "default":    "{% static 'map/images/default.png' %}"
    };

    // 시설 타입 한글명
    var facilityLabel = {
        "police":     "경찰",
        "cctv":       "CCTV",
        "security":   "보안등",
        "streetlamp": "가로등"
    };

    function initTmap() {
        map = new Tmapv2.Map("map_div", {
            center: new Tmapv2.LatLng(37.56259379, 126.99243652),
            width: "100%", height: "400px",
            zoom: 17, zoomControl: true, scrollwheel: true
        });

        $("#btn_current").click(function () {
            navigator.geolocation.getCurrentPosition(function (pos) {
                selectedLat_s = pos.coords.latitude;
                selectedLon_s = pos.coords.longitude;
                $("#start_result").text("현위치 (" + selectedLat_s.toFixed(5) + ", " + selectedLon_s.toFixed(5) + ")");
                map.setCenter(new Tmapv2.LatLng(selectedLat_s, selectedLon_s));
            });
        });

        $("#btn_search_start").click(function () { searchPOI($("#startKeyword").val(), "start"); });
        $("#btn_select").click(function ()        { searchPOI($("#searchKeyword").val(), "end"); });

        $("#btn_search").click(function () {
            if (!selectedLat_s || !selectedLon_s) { alert("출발지를 선택하세요."); return; }
            if (!selectedLat_e || !selectedLon_e) { alert("도착지를 선택하세요."); return; }
            $("#route_list").html("");
            $("#result").text("경로 수집 중...");
            clearAll();
            collectAllRoutes();
        });
    }

    // ── POI 검색 ──
    function searchPOI(keyword, type) {
        if (!keyword) { alert("검색어를 입력하세요."); return; }
        $.ajax({
            method: "GET",
            headers: { appKey: "{{ tmap_app_key }}" },
            url: "https://apis.openapi.sk.com/tmap/pois?version=1&format=json",
            data: { searchKeyword: keyword, resCoordType: "EPSG3857", reqCoordType: "WGS84GEO", count: 5 },
            success: function (response) {
                var pois   = response.searchPoiInfo.pois.poi;
                var listId = (type === "start") ? "#startResult" : "#searchResult";
                markerArr.forEach(function (m) { m.setMap(null); });
                markerArr = [];
                var html = "";
                pois.forEach(function (poi, k) {
                    var pt  = new Tmapv2.Point(Number(poi.noorLon), Number(poi.noorLat));
                    var wgs = new Tmapv2.Projection.convertEPSG3857ToWGS84GEO(pt);
                    var lat = wgs._lat, lon = wgs._lng;
                    markerArr.push(new Tmapv2.Marker({ position: new Tmapv2.LatLng(lat, lon), map: map, title: poi.name }));
                    html += '<li class="search-item" data-lat="' + lat + '" data-lon="' + lon + '" data-type="' + type + '">' + poi.name + '</li>';
                    if (k === 0) map.setCenter(new Tmapv2.LatLng(lat, lon));
                });
                $(listId).html(html);
                $(listId + " .search-item").click(function () {
                    $(listId + " .search-item").css("background", "");
                    $(this).css("background", "#ddd");
                    var lat = $(this).data("lat"), lon = $(this).data("lon"), t = $(this).data("type");
                    if (t === "start") {
                        selectedLat_s = lat; selectedLon_s = lon;
                        $("#start_result").text("출발지: " + $(this).text().trim());
                    } else {
                        selectedLat_e = lat; selectedLon_e = lon;
                        $("#end_result").text("도착지: " + $(this).text().trim());
                    }
                    map.setCenter(new Tmapv2.LatLng(lat, lon));
                });
            }
        });
    }

    // ── 경로 수집 ──
    var collectedRoutes = [];
    function collectAllRoutes() {
        collectedRoutes = [];
        fetchRouteSequential(0);
    }

    function fetchRouteSequential(index) {
        if (index >= routeConfigs.length) {
            var unique = removeDuplicates(collectedRoutes);
            sendToDjango(unique);
            return;
        }
        var config = routeConfigs[index];
        $.ajax({
            dataType: "json", method: "POST",
            headers: { appKey: "{{ tmap_app_key }}" },
            url: "https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1&format=json",
            data: {
                startX: selectedLon_s, startY: selectedLat_s,
                endX: selectedLon_e,   endY: selectedLat_e,
                reqCoordType: "WGS84GEO", resCoordType: "WGS84GEO",
                startName: "출발지", endName: "도착지",
                searchOption: config.searchOption
            },
            success: function (response) {
                var features = response.features;
                var coords   = [];
                features.forEach(function (f) {
                    if (f.geometry.type === "LineString") {
                        f.geometry.coordinates.forEach(function (c) {
                            coords.push({ lat: c[1], lon: c[0] });
                        });
                    }
                });
                collectedRoutes.push({
                    name: config.name, searchOption: config.searchOption,
                    distance: features[0].properties.totalDistance / 1000,
                    duration: features[0].properties.totalTime / 60,
                    coords: coords
                });
                $("#result").text("경로 수집 중... (" + (index + 1) + "/" + routeConfigs.length + ")");
                fetchRouteSequential(index + 1);
            },
            error: function () { fetchRouteSequential(index + 1); }
        });
    }

    function removeDuplicates(routes) {
        var unique = [];
        routes.forEach(function (route) {
            var coords = route.coords;
            if (!coords.length) return;
            var first = coords[0], last = coords[coords.length - 1], count = coords.length;
            var isDup = unique.some(function (u) {
                var uf = u.coords[0], ul = u.coords[u.coords.length - 1];
                return uf.lat === first.lat && uf.lon === first.lon &&
                       ul.lat === last.lat  && ul.lon === last.lon  &&
                       u.coords.length === count;
            });
            if (!isDup) unique.push(route);
        });
        return unique;
    }

    // ── Django POST ──
    function sendToDjango(routes) {
        $("#result").text("안전지수 계산 중...");
        fetch("/api/recommend/", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": getCookie("csrftoken") },
            body: JSON.stringify({ routes: routes })
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
            routeData = data.routes;
            renderRouteCards(routeData);
            $("#result").text("경로 카드를 클릭하면 경로와 안전시설이 표시됩니다.");
        })
        .catch(function (err) { $("#result").text("오류: " + err.message); });
    }

    // ── 경로 카드 렌더링 ──
    function renderRouteCards(routes) {
        var html = "";
        routes.forEach(function (route, idx) {
            var color = routeColors[idx % routeColors.length];
            html += '<div class="route-card" data-idx="' + idx + '" onclick="toggleRoute(' + idx + ')">' +
                '<div class="score" style="color:' + color + '">' + route.total_score + '</div>' +
                '<div class="label">' + route.name + '</div>' +
                '<div class="label">' + route.distance.toFixed(1) + 'km / ' + Math.round(route.duration) + '분</div>' +
                '<div class="label">경찰:' + route.police_score +
                ' CCTV:' + route.cctv_score + '</div>' +
                '<div class="label">보안등:' + route.security_score +
                ' 가로등:' + route.streetlamp_score + '</div>' +
                '</div>';
        });
        $("#route_list").html(html);
    }

    // ── 경로 + 시설 마커 토글 ──
    function toggleRoute(idx) {
        var card = $(".route-card[data-idx=" + idx + "]");

        if (activeLines[idx]) {
            // 경로 + 시설 마커 숨김
            activeLines[idx].setMap(null);
            delete activeLines[idx];

            if (activeFacMarkers[idx]) {
                activeFacMarkers[idx].forEach(function (m) { m.setMap(null); });
                delete activeFacMarkers[idx];
            }
            card.removeClass("active");
        } else {
            // 경로 그리기
            var route  = routeData[idx];
            var color  = routeColors[idx % routeColors.length];
            var path   = route.coords.map(function (c) { return new Tmapv2.LatLng(c.lat, c.lon); });
            activeLines[idx] = new Tmapv2.Polyline({
                path: path, strokeColor: color, strokeWeight: 5, map: map
            });

            // 시설 마커 표시
            var facMarkers = [];
            (route.facilities || []).forEach(function (fac) {
                var iconUrl  = facilityIcons[fac.icon] || facilityIcons["default"];
                var marker   = new Tmapv2.Marker({
                    position: new Tmapv2.LatLng(fac.lat, fac.lon),
                    icon:     iconUrl,
                    iconSize: new Tmapv2.Size(16, 16),
                    title:    facilityLabel[fac.icon] || fac.type,
                    map:      map
                });
                facMarkers.push(marker);
            });
            activeFacMarkers[idx] = facMarkers;

            card.addClass("active");
            if (path.length > 0) map.setCenter(path[0]);
        }
    }

    function clearAll() {
        Object.values(activeLines).forEach(function (p) { p.setMap(null); });
        Object.values(activeFacMarkers).forEach(function (arr) {
            arr.forEach(function (m) { m.setMap(null); });
        });
        activeLines      = {};
        activeFacMarkers = {};
        $(".route-card").removeClass("active");
    }

    function getCookie(name) {
        var value = null;
        document.cookie.split(";").forEach(function (c) {
            c = c.trim();
            if (c.startsWith(name + "=")) value = decodeURIComponent(c.substring(name.length + 1));
        });
        return value;
    }
</script>
</head>
<body onload="initTmap();">
    <p><a href="{% url 'map:index' %}">Reload map</a></p>
    <h1>안전 경로 탐색</h1>

    <div id="map_div" style="width:100%; height:400px; border:1px solid #ccc;"></div>
    <div id="route_list" style="margin:8px 0;"></div>
    <p id="result">경로를 탐색해보세요.</p>

    <div>
        <input type="text" id="startKeyword" placeholder="출발지 검색">
        <button id="btn_search_start">검색</button>
        <button id="btn_current">현위치</button>
    </div>
    <p id="start_result">출발지 미설정</p>
    <ul id="startResult"></ul>

    <div>
        <input type="text" id="searchKeyword" placeholder="도착지 검색">
        <button id="btn_select">검색</button>
    </div>
    <p id="end_result">도착지 미설정</p>
    <ul id="searchResult"></ul>

    <div>
        <button id="btn_search">경로 탐색</button>
    </div>
</body>
</html>
