<!DOCTYPE html>
{% load static %}
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전 귀갓길 찾기</title>
<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
<link rel="stylesheet" href="{% static 'map/styles.css' %}">
<script src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey={{ tmap_app_key }}"></script>
<style>
    /* ── 피그마 디자인 토큰 ── */
    :root {
        --background:   #ffffff;
        --foreground:   #030213;
        --card:         #ffffff;
        --muted:        #ececf0;
        --muted-fg:     #717182;
        --border:       rgba(0,0,0,0.1);
        --input-bg:     #f3f3f5;
        --primary:      #2563eb;   /* blue-600 */
        --primary-hover:#1d4ed8;   /* blue-700 */
        --green:        #16a34a;
        --radius:       0.625rem;
        --shadow:       0 2px 12px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: var(--muted); height: 100vh; display: flex; flex-direction: column; }

    /* ── 지도 ── */
    #map_div { width: 100%; flex: 1; }

    /* ── 검색 패널 (지도 위 절대 위치) ── */
    #search-panel {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        width: 100%;
        max-width: 420px;
        padding: 0 16px;
    }
    .panel-card {
        background: var(--card);
        border-radius: calc(var(--radius) * 1.5);
        box-shadow: var(--shadow);
        padding: 16px;
    }
    .panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
    }
    .panel-header .shield {
        width: 24px; height: 24px;
        background: var(--primary);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 13px;
    }
    .panel-header h1 { font-size: 17px; font-weight: 600; color: var(--foreground); }

    /* 입력 행 */
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .input-wrap {
        flex: 1;
        display: flex; align-items: center; gap: 8px;
        padding: 10px 12px;
        background: var(--input-bg);
        border-radius: var(--radius);
        border: 1.5px solid transparent;
        transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--primary); }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue { background: var(--primary); }
    .dot-red  { background: #ef4444; }
    .input-wrap input {
        flex: 1; border: none; outline: none;
        background: transparent; font-size: 14px; color: var(--foreground);
    }
    .input-wrap input::placeholder { color: var(--muted-fg); }

    /* 버튼 */
    .btn-icon {
        padding: 10px; border: none; cursor: pointer;
        border-radius: var(--radius); transition: background 0.2s;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
    }
    .btn-primary-icon { background: var(--primary); color: white; }
    .btn-primary-icon:hover { background: var(--primary-hover); }
    .btn-full {
        width: 100%; padding: 12px; border: none; cursor: pointer;
        background: var(--primary); color: white;
        border-radius: var(--radius); font-size: 15px; font-weight: 500;
        display: flex; align-items: center; justify-content: center; gap: 6px;
        transition: background 0.2s;
    }
    .btn-full:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-full:disabled { background: var(--muted); color: var(--muted-fg); cursor: not-allowed; }

    /* 상태 텍스트 */
    .status-text { font-size: 12px; color: var(--muted-fg); margin-bottom: 4px; padding-left: 2px; }

    /* ── 경로 결과 패널 ── */
    #route-panel {
        position: absolute;
        top: 16px; left: 16px;
        z-index: 1000;
        width: 300px;
        max-height: calc(100vh - 32px);
        background: var(--card);
        border-radius: calc(var(--radius) * 1.5);
        box-shadow: var(--shadow);
        overflow-y: auto;
        display: none;
    }
    .route-panel-header {
        position: sticky; top: 0;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 14px 16px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .route-panel-header .title {
        display: flex; align-items: center; gap: 6px;
        font-size: 15px; font-weight: 600; color: var(--foreground);
    }
    .route-panel-header .title .shield-sm {
        width: 20px; height: 20px; background: var(--green);
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        color: white; font-size: 11px;
    }
    .btn-close {
        background: none; border: none; cursor: pointer;
        color: var(--muted-fg); font-size: 18px; line-height: 1;
        padding: 2px 4px; border-radius: 4px;
    }
    .btn-close:hover { background: var(--muted); color: var(--foreground); }

    /* 경로 카드 */
    .route-cards { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .route-card {
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: var(--card);
        text-align: left; width: 100%;
    }
    .route-card:hover   { border-color: #93c5fd; background: #f0f7ff; }
    .route-card.active  { border-color: var(--primary); background: #eff6ff; }

    .route-card-top {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 10px;
    }
    .route-card-top .left { display: flex; align-items: center; gap: 6px; }
    .badge-safe {
        padding: 2px 8px; background: #dcfce7; color: var(--green);
        font-size: 11px; font-weight: 600; border-radius: 99px;
    }
    .route-name { font-size: 14px; font-weight: 600; color: var(--foreground); }
    .route-time { font-size: 13px; color: var(--primary); font-weight: 500; }

    .safety-score-box {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 10px; background: var(--muted);
        border-radius: calc(var(--radius) - 2px); margin-bottom: 8px;
    }
    .safety-score-box .label { font-size: 12px; color: var(--muted-fg); }
    .safety-score-box .score { font-size: 20px; font-weight: 700; color: var(--green); }

    .facility-grid {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    }
    .facility-item {
        display: flex; flex-direction: column; align-items: center;
        padding: 6px 4px; background: var(--muted);
        border-radius: calc(var(--radius) - 2px);
    }
    .facility-icon { font-size: 16px; margin-bottom: 2px; }
    .facility-label { font-size: 10px; color: var(--muted-fg); }
    .facility-count { font-size: 13px; font-weight: 600; color: var(--foreground); }

    .route-distance { font-size: 11px; color: var(--muted-fg); text-align: center; margin-top: 6px; }

    /* 범례 */
    .legend {
        border-top: 1px solid var(--border);
        padding: 12px 16px;
    }
    .legend h3 { font-size: 12px; font-weight: 600; color: var(--foreground); margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .legend-dot {
        width: 22px; height: 22px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; color: white; flex-shrink: 0;
    }
    .legend-item span { font-size: 11px; color: var(--muted-fg); }

    /* 현위치 버튼 */
    #btn_location {
        position: absolute; bottom: 80px; right: 16px; z-index: 1000;
        width: 44px; height: 44px; border-radius: 50%;
        background: var(--card); border: 1.5px solid var(--border);
        box-shadow: var(--shadow); cursor: pointer; font-size: 20px;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
    }
    #btn_location:hover { background: #eff6ff; }

    /* POI 검색 결과 */
    .search-result-wrap {
        position: absolute; z-index: 1100;
        background: var(--card); border-radius: var(--radius);
        box-shadow: var(--shadow); width: 100%; max-height: 200px;
        overflow-y: auto; margin-top: 4px;
    }
    .search-result-wrap li {
        list-style: none; padding: 10px 14px; font-size: 13px;
        cursor: pointer; border-bottom: 1px solid var(--border); color: var(--foreground);
    }
    .search-result-wrap li:last-child { border-bottom: none; }
    .search-result-wrap li:hover { background: var(--muted); }
    .search-result-wrap li.selected { background: #eff6ff; }

    /* 스피너 */
    .spinner {
        width: 16px; height: 16px; border: 2px solid white;
        border-top-color: transparent; border-radius: 50%;
        animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script type="text/javascript">
    var map;
    var startMarkerArr = [];   // 출발지/현위치 마커
    var endMarkerArr   = [];   // 도착지 마커
    var routeData      = [];
    var activeLines   = {};
    var activeFacMarkers = {};

    var selectedLat_s = null, selectedLon_s = null;
    var selectedLat_e = null, selectedLon_e = null;

    var routeConfigs = [
        { name: "추천",     searchOption: "0"  },
        { name: "대로우선", searchOption: "4"  },
        { name: "최단",     searchOption: "10" },
        { name: "계단제외", searchOption: "30" }
    ];
    var routeColors = ["#2563eb", "#16a34a", "#d97706", "#dc2626"];

    var facilityIcons = {
        "police":     "{% static 'map/images/police.png' %}",
        "cctv":       "{% static 'map/images/cctv.png' %}",
        "security":   "{% static 'map/images/security.png' %}",
        "streetlamp": "{% static 'map/images/lamp.png' %}",
        "startpoint": "{% static 'map/images/start_pin.png' %}",
        "endpoint":   "{% static 'map/images/arrive_pin.png' %}",
        "current":   "{% static 'map/images/current_pin.png' %}",
        "default":    "{% static 'map/images/default.png' %}" //기본값
    };

    function initTmap() {
        map = new Tmapv2.Map("map_div", {
            center: new Tmapv2.LatLng(37.56259379, 126.99243652),
            width: "100%", height: "100%",
            zoom: 15, zoomControl: true, scrollwheel: true
        });

        // 버튼 이벤트
        $("#btn_current").click(setCurrentLocation);
        $("#btn_location").click(setCurrentLocation);
        $("#btn_search_start").click(function () { searchPOI($("#startKeyword").val(), "start"); });
        $("#btn_select").click(function ()        { searchPOI($("#searchKeyword").val(), "end"); });
        $("#btn_route_close").click(function ()   { $("#route-panel").hide(); clearAll(); });
        $("#btn_search").click(function () {
            if (!selectedLat_s || !selectedLon_s) { alert("출발지를 선택하세요."); return; }
            if (!selectedLat_e || !selectedLon_e) { alert("도착지를 선택하세요."); return; }
            startSearch();
        });
    }

    function setCurrentLocation() {
        navigator.geolocation.getCurrentPosition(function (pos) {
            selectedLat_s = pos.coords.latitude;
            selectedLon_s = pos.coords.longitude;
            $("#start_status").text("현위치로 설정됨");
            $("#startKeyword").val("현위치");

            // 출발지 마커만 초기화 (도착지 마커 유지)
            startMarkerArr.forEach(function (m) { m.setMap(null); });
            startMarkerArr = [];

            var currentMarker = new Tmapv2.Marker({
                position: new Tmapv2.LatLng(selectedLat_s, selectedLon_s),
                map: map,
                icon: facilityIcons["current"],
                iconSize: new Tmapv2.Size(32, 32),
                title: "현위치"
            });
            startMarkerArr.push(currentMarker);
            map.setCenter(new Tmapv2.LatLng(selectedLat_s, selectedLon_s));
        });
    }

    // ── POI 검색 ──
    function searchPOI(keyword, type) {
        if (!keyword) { alert("검색어를 입력하세요."); return; }
        var resultId  = (type === "start") ? "#startResults" : "#endResults";
        var markerRef = (type === "start") ? startMarkerArr : endMarkerArr;

        $.ajax({
            method: "GET",
            headers: { appKey: "{{ tmap_app_key }}" },
            url: "https://apis.openapi.sk.com/tmap/pois?version=1&format=json",
            data: { searchKeyword: keyword, resCoordType: "EPSG3857", reqCoordType: "WGS84GEO", count: 5 },
            success: function (response) {
                var pois = response.searchPoiInfo.pois.poi;

                // 해당 타입 마커만 초기화 (반대쪽 마커 유지)
                markerRef.forEach(function (m) { m.setMap(null); });
                markerRef.length = 0;

                var html = "";
                pois.forEach(function (poi, k) {
                    var pt  = new Tmapv2.Point(Number(poi.noorLon), Number(poi.noorLat));
                    var wgs = new Tmapv2.Projection.convertEPSG3857ToWGS84GEO(pt);
                    var lat = wgs._lat, lon = wgs._lng;
                    var markerIcon = (type === "start") ? facilityIcons["startpoint"] : facilityIcons["endpoint"];
                    markerRef.push(new Tmapv2.Marker({
                        position: new Tmapv2.LatLng(lat, lon),
                        map: map, title: poi.name,
                        icon: markerIcon,
                        iconSize: new Tmapv2.Size(32, 38)
                    }));
                    html += '<li data-lat="' + lat + '" data-lon="' + lon + '" data-type="' + type + '">' + poi.name + '</li>';
                    if (k === 0) map.setCenter(new Tmapv2.LatLng(lat, lon));
                });
                $(resultId).html(html).show();
                $(resultId + " li").click(function () {
                    $(resultId + " li").removeClass("selected");
                    $(this).addClass("selected");

                    var lat  = $(this).data("lat");
                    var lon  = $(this).data("lon");
                    var t    = $(this).data("type");
                    var name = $(this).text().trim();
                    var clickedIndex = $(this).index();

                    if (t === "start") {
                        selectedLat_s = lat; selectedLon_s = lon;
                        $("#startKeyword").val(name);
                        $("#start_status").text("출발지 설정됨");
                    } else {
                        selectedLat_e = lat; selectedLon_e = lon;
                        $("#searchKeyword").val(name);
                        $("#end_status").text("도착지 설정됨");
                    }

                    // 선택된 마커만 남기고 나머지 제거
                    var selectedMarker = markerRef[clickedIndex];
                    markerRef.forEach(function (m, idx) {
                        if (idx !== clickedIndex) m.setMap(null);
                    });
                    markerRef.length = 0;
                    if (selectedMarker) markerRef.push(selectedMarker);

                    $(resultId).hide();
                    map.setCenter(new Tmapv2.LatLng(lat, lon));
                });
            }
        });
    }

    // ── 경로 수집 시작 ──
    var collectedRoutes = [];
    function startSearch() {
        collectedRoutes = [];
        clearAll();
        $("#route-panel").hide();
        setSearching(true);
        fetchRouteSequential(0);
    }

    function fetchRouteSequential(index) {
        if (index >= routeConfigs.length) {
            var unique = removeDuplicates(collectedRoutes);
            sendToDjango(unique);
            return;
        }
        var config = routeConfigs[index];
        $.ajax({
            dataType: "json", method: "POST",
            headers: { appKey: "{{ tmap_app_key }}" },
            url: "https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1&format=json",
            data: {
                startX: selectedLon_s, startY: selectedLat_s,
                endX: selectedLon_e,   endY: selectedLat_e,
                reqCoordType: "WGS84GEO", resCoordType: "WGS84GEO",
                startName: "출발지", endName: "도착지",
                searchOption: config.searchOption
            },
            success: function (response) {
                var features = response.features;
                var coords   = [];
                features.forEach(function (f) {
                    if (f.geometry.type === "LineString")
                        f.geometry.coordinates.forEach(function (c) { coords.push({ lat: c[1], lon: c[0] }); });
                });
                collectedRoutes.push({
                    name: config.name, searchOption: config.searchOption,
                    distance: features[0].properties.totalDistance / 1000,
                    duration: features[0].properties.totalTime / 60,
                    coords: coords
                });
                fetchRouteSequential(index + 1);
            },
            error: function () { fetchRouteSequential(index + 1); }
        });
    }

    function removeDuplicates(routes) {
        var unique = [];
        routes.forEach(function (r) {
            if (!r.coords.length) return;
            var f = r.coords[0], l = r.coords[r.coords.length - 1];
            var dup = unique.some(function (u) {
                var uf = u.coords[0], ul = u.coords[u.coords.length - 1];
                return uf.lat === f.lat && uf.lon === f.lon && ul.lat === l.lat && ul.lon === l.lon && u.coords.length === r.coords.length;
            });
            if (!dup) unique.push(r);
        });
        return unique;
    }

    // ── Django POST ──
    function sendToDjango(routes) {
        fetch("/api/recommend/", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": getCookie("csrftoken") },
            body: JSON.stringify({ routes: routes })
        })
        .then(function (res) {
            if (!res.ok) return res.text().then(function (txt) { throw new Error('HTTP ' + res.status + ': ' + txt); });
            return res.json();
        })
        .then(function (data) {
            setSearching(false);
            routeData = data.routes;
            renderRoutePanel(routeData);
            $("#route-panel").show();
        })
        .catch(function (err) {
            setSearching(false);
            alert("오류: " + err.message);
        });
    }

    // ── 경로 패널 렌더링 ──
    function renderRoutePanel(routes) {
        var html = "";
        routes.forEach(function (route, idx) {
            var isBest = idx === 0;
            html += '<button class="route-card" data-idx="' + idx + '" onclick="toggleRoute(' + idx + ')">' +
                '<div class="route-card-top">' +
                    '<div class="left">' +
                        (isBest ? '<span class="badge-safe">최고 안전</span>' : '') +
                        '<span class="route-name">' + route.name + '</span>' +
                    '</div>' +
                    '<span class="route-time">⏱ ' + Math.round(route.duration) + '분</span>' +
                '</div>' +
                '<div class="safety-score-box">' +
                    '<span class="label">안전지수</span>' +
                    '<span class="score">' + route.total_score + '</span>' +
                '</div>' +
                '<div class="facility-grid">' +
                    '<div class="facility-item"><span class="facility-icon">🚓</span><span class="facility-label">경찰</span><span class="facility-count">' + route.police_score + '</span></div>' +
                    '<div class="facility-item"><span class="facility-icon">📹</span><span class="facility-label">CCTV</span><span class="facility-count">' + route.cctv_score + '</span></div>' +
                    '<div class="facility-item"><span class="facility-icon">💡</span><span class="facility-label">보안등</span><span class="facility-count">' + route.security_score + '</span></div>' +
                    '<div class="facility-item"><span class="facility-icon">🔦</span><span class="facility-label">가로등</span><span class="facility-count">' + route.streetlamp_score + '</span></div>' +
                '</div>' +
                '<div class="route-distance">' + route.distance.toFixed(1) + 'km</div>' +
            '</button>';
        });
        $("#route-cards").html(html);
    }

    // ── 경로 토글 ──
    function toggleRoute(idx) {
        var card = $(".route-card[data-idx=" + idx + "]");
        if (activeLines[idx]) {
            activeLines[idx].setMap(null); delete activeLines[idx];
            (activeFacMarkers[idx] || []).forEach(function (m) { m.setMap(null); });
            delete activeFacMarkers[idx];
            card.removeClass("active");
        } else {
            var route = routeData[idx];
            var color = routeColors[idx % routeColors.length];
            var path  = route.coords.map(function (c) { return new Tmapv2.LatLng(c.lat, c.lon); });
            activeLines[idx] = new Tmapv2.Polyline({ path: path, strokeColor: color, strokeWeight: 5, map: map });
            var fms = [];
            (route.facilities || []).forEach(function (fac) {
                fms.push(new Tmapv2.Marker({
                    position: new Tmapv2.LatLng(fac.lat, fac.lon),
                    icon: facilityIcons[fac.icon] || facilityIcons["cctv"],
                    iconSize: new Tmapv2.Size(16, 16),
                    title: fac.type, map: map
                }));
            });
            activeFacMarkers[idx] = fms;
            card.addClass("active");
            if (path.length > 0) map.setCenter(path[0]);
        }
    }

    function clearAll() {
        Object.values(activeLines).forEach(function (p) { p.setMap(null); });
        Object.values(activeFacMarkers).forEach(function (arr) { arr.forEach(function (m) { m.setMap(null); }); });
        activeLines = {}; activeFacMarkers = {};
        $(".route-card").removeClass("active");
    }

    function setSearching(on) {
        if (on) {
            $("#btn_search").prop("disabled", true).html('<span class="spinner"></span> 경로 탐색 중...');
        } else {
            $("#btn_search").prop("disabled", false).html('🛡 안전한 경로 찾기');
        }
    }

    function getCookie(name) {
        var value = null;
        document.cookie.split(";").forEach(function (c) {
            c = c.trim();
            if (c.startsWith(name + "=")) value = decodeURIComponent(c.substring(name.length + 1));
        });
        return value;
    }
</script>
</head>
<body onload="initTmap();">

<!-- 지도 -->
<div style="position:relative; flex:1; min-height:0;">
    <div id="map_div" style="width:100%; height:100vh;"></div>

    <!-- 검색 패널 -->
    <div id="search-panel">
        <div class="panel-card">
            <div class="panel-header">
                <div class="shield">🛡</div>
                <h1>안전 귀갓길 찾기</h1>
            </div>

            <!-- 출발지 -->
            <div style="position:relative; margin-bottom:10px;">
                <div class="input-row">
                    <div class="input-wrap">
                        <div class="dot dot-blue"></div>
                        <input type="text" id="startKeyword" placeholder="출발지 입력">
                    </div>
                    <button class="btn-icon btn-primary-icon" id="btn_search_start" title="검색">🔍</button>
                    <button class="btn-icon btn-primary-icon" id="btn_current" title="현위치">📍</button>
                </div>
                <div class="search-result-wrap" id="startResults" style="display:none;"></div>
                <div class="status-text" id="start_status">출발지 미설정</div>
            </div>

            <!-- 도착지 -->
            <div style="position:relative; margin-bottom:12px;">
                <div class="input-row">
                    <div class="input-wrap">
                        <div class="dot dot-red"></div>
                        <input type="text" id="searchKeyword" placeholder="목적지 입력">
                    </div>
                    <button class="btn-icon btn-primary-icon" id="btn_select" title="검색">🔍</button>
                </div>
                <div class="search-result-wrap" id="endResults" style="display:none;"></div>
                <div class="status-text" id="end_status">도착지 미설정</div>
            </div>

            <button id="btn_search" class="btn-full">🛡 안전한 경로 찾기</button>
        </div>
    </div>

    <!-- 경로 결과 패널 -->
    <div id="route-panel">
        <div class="route-panel-header">
            <div class="title">
                <div class="shield-sm">🛡</div>
                추천 경로
            </div>
            <button class="btn-close" id="btn_route_close">✕</button>
        </div>
        <div class="route-cards" id="route-cards"></div>
        <div class="legend">
            <h3>안전시설 범례</h3>
            <div class="legend-item">
                <div class="legend-dot" style="background:#2563eb;">🚓</div>
                <span>경찰서/지구대/파출소</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#16a34a;">📹</div>
                <span>CCTV</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#d97706;">💡</div>
                <span>보안등</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#dc2626;">🔦</div>
                <span>가로등</span>
            </div>
        </div>
    </div>

    <!-- 현위치 버튼 -->
    <button id="btn_location" title="현위치">📍</button>
</div>

</body>
</html>
